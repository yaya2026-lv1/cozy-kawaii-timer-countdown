<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos OS | Advanced Chronometer Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Professional / Tech Theme (Default) */
            --bg-primary: #0a0f1d;
            --bg-secondary: #111827;
            --bg-surface: #1f2937;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #374151;
            --panel-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --font-display: 'Courier New', monospace;
        }

        [data-theme="cute"] {
            --bg-primary: #fff0f5;
            --bg-secondary: #ffe4e1;
            --bg-surface: #ffffff;
            --accent: #ff69b4;
            --accent-glow: rgba(255, 105, 180, 0.3);
            --text-main: #4a2e35;
            --text-muted: #a1828a;
            --border: #ffccd5;
            --panel-shadow: 0 8px 32px 0 rgba(255, 105, 180, 0.15);
            --font-display: 'Comic Sans MS', cursive, sans-serif;
        }

        [data-theme="cozy"] {
            --bg-primary: #2b2621;
            --bg-secondary: #3d352e;
            --bg-surface: #4a4037;
            --accent: #d4a373;
            --accent-glow: rgba(212, 163, 115, 0.3);
            --text-main: #fefae0;
            --text-muted: #ccd5ae;
            --border: #605244;
            --panel-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            --font-display: 'Georgia', serif;
        }

        [data-theme="cyberpunk"] {
            --bg-primary: #050505;
            --bg-secondary: #0f0c1b;
            --bg-surface: #1a103c;
            --accent: #00ff66;
            --accent-glow: rgba(0, 255, 102, 0.4);
            --text-main: #00ffff;
            --text-muted: #ab00ff;
            --border: #ab00ff;
            --panel-shadow: 0 0 20px rgba(255, 0, 128, 0.2);
            --font-display: Impact, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Top Analytical Navbar */
        header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .sys-status {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-muted);
        }

        .status-node {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
        }

        /* Main Grid Architecture */
        .dashboard {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            flex-grow: 1;
            height: calc(100vh - 42px);
        }

        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
                height: auto;
                overflow-y: auto;
            }
            header { flex-wrap: wrap; gap: 10px; }
        }

        /* Panel Standardizations */
        .panel {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            margin: 15px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--panel-shadow);
            overflow: hidden;
        }

        .panel-header {
            background-color: var(--bg-surface);
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            color: var(--text-muted);
        }

        .panel-body {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Control Inputs Elements */
        .matrix-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        input, select {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 4px;
            font-family: inherit;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 5px var(--accent-glow);
        }

        .time-inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        /* Theme Matrices Selector */
        .theme-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .theme-btn {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-btn:hover, .theme-btn.active {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        /* Center Display Core */
        .chronometer-core {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        .telemetry-circle {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        svg circle {
            fill: none;
            stroke-width: 6;
        }

        svg .bg {
            stroke: var(--bg-surface);
        }

        svg .progress {
            stroke: var(--accent);
            stroke-dasharray: 942;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.1s linear;
        }

        .digital-readout {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: bold;
            z-index: 2;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .system-controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg-surface);
            color: var(--text-main);
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .btn:hover {
            filter: brightness(1.2);
        }

        .btn-prime {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
        }

        /* Logging & Metrics Console */
        .console-log {
            font-family: monospace;
            font-size: 0.75rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            color: var(--text-muted);
        }

        .console-line {
            margin-bottom: 4px;
            border-left: 2px solid var(--accent);
            padding-left: 5px;
        }

        /* Audio Alert Systems Module */
        .audio-node {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-surface);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
        }

        .icon-btn:hover {
            color: var(--accent);
        }

        /* Custom Presets Grid */
        .preset-chip {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preset-chip:hover {
            border-color: var(--accent);
        }
    </style>
</head>
<body data-theme="professional">

    <header>
        <div class="sys-status">
            <div class="status-node"><div class="status-dot"></div> CORE ENGINE: ACTIVE</div>
            <div class="status-node"><i class="fa-solid var(--accent) fa-microchip"></i> MATRIX: 64-BIT</div>
        </div>
        <div class="sys-status">
            <div class="status-node" id="live-clock"><i class="fa-solid fa-clock"></i> 00:00:00 UTC</div>
        </div>
    </header>

    <main class="dashboard">
        
        <section class="panel">
            <div class="panel-header">
                <span><i class="fa-solid fa-sliders"></i> Engine Configuration</span>
                <i class="fa-solid fa-gear icon-btn"></i>
            </div>
            <div class="panel-body">
                <div class="matrix-group">
                    <label>Chronometer Label</label>
                    <input type="text" id="timer-title" value="OPERATION DELTA">
                </div>
                
                <div class="matrix-group">
                    <label>Temporal Vectors (H / M / S)</label>
                    <div class="time-inputs">
                        <input type="number" id="hours" min="0" max="23" value="0" placeholder="00">
                        <input type="number" id="minutes" min="0" max="59" value="10" placeholder="00">
                        <input type="number" id="seconds" min="0" max="59" value="0" placeholder="00">
                    </div>
                </div>

                <div class="matrix-group">
                    <label>Audio Matrix Warning</label>
                    <select id="alert-sound">
                        <option value="sine">Synthesized Sonar (Frequency)</option>
                        <option value="square">Industrial Klaxon (Squarewave)</option>
                        <option value="sawtooth">Cybernetic Breach (Sawtooth)</option>
                    </select>
                </div>

                <div class="audio-node">
                    <span><i class="fa-solid fa-volume-high"></i> Master Output Node</span>
                    <button class="icon-btn" id="test-audio" title="Test Alarm Frequencies"><i class="fa-solid fa-wave-square"></i> Test</button>
                </div>
            </div>
        </section>

        <section class="chronometer-core">
            <h2 id="display-title" style="letter-spacing: 3px; font-size: 1rem; margin-bottom: 20px; text-transform: uppercase;">OPERATION DELTA</h2>
            
            <div class="telemetry-circle">
                <svg>
                    <circle class="bg" cx="160" cy="160" r="150"></circle>
                    <circle class="progress" id="progress-ring" cx="160" cy="160" r="150"></circle>
                </svg>
                <div class="digital-readout" id="countdown-display">10:00</div>
            </div>

            <div class="system-controls">
                <button class="btn btn-prime" id="start-btn"><i class="fa-solid fa-play"></i> Initialize</button>
                <button class="btn" id="pause-btn" disabled><i class="fa-solid fa-pause"></i> Suspend</button>
                <button class="btn" id="reset-btn"><i class="fa-solid fa-arrow-rotate-left"></i> Purge</button>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">
                <span><i class="fa-solid fa-palette"></i> Matrix Themes</span>
                <i class="fa-solid fa-circle-info icon-btn"></i>
            </div>
            <div class="panel-body">
                <div class="theme-grid">
                    <button class="theme-btn active" onclick="switchTheme('professional', this)"><i class="fa-solid fa-user-tie"></i> Pro</button>
                    <button class="theme-btn" onclick="switchTheme('cozy', this)"><i class="fa-solid fa-mug-hot"></i> Cozy</button>
                    <button class="theme-btn" onclick="switchTheme('cute', this)"><i class="fa-solid fa-heart"></i> Cute</button>
                    <button class="theme-btn" onclick="switchTheme('cyberpunk', this)"><i class="fa-solid fa-bolt"></i> Cyber</button>
                </div>

                <div class="matrix-group" style="margin-top: 10px;">
                    <label>Rapid Load Matrices</label>
                    <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 5px;">
                        <div class="preset-chip" onclick="loadPreset(0, 5, 0)"><span>05:00 Tactical</span><i class="fa-solid fa-bolt"></i></div>
                        <div class="preset-chip" onclick="loadPreset(0, 25, 0)"><span>25:00 Focus Block</span><i class="fa-solid fa-brain"></i></div>
                        <div class="preset-chip" onclick="loadPreset(1, 0, 0)"><span>60:00 Standard Cycle</span><i class="fa-solid fa-hourglass-half"></i></div>
                    </div>
                </div>

                <div class="matrix-group" style="flex-grow: 1;">
                    <label>Terminal Activity Diagnostics</label>
                    <div class="console-log" id="terminal-log">
                        <div class="console-line">System loaded standard architecture.</div>
                        <div class="console-line">Frequencies initialized standard.</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // State Machine Management
        let totalSecondsAvailable = 600;
        let dynamicSecondsRemaining = 600;
        let countdownTicker = null;
        let coreEngineRunning = false;

        // Sound Synthesis Module (Web Audio API)
        const AudioSubsystem = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            trigger(waveform = 'sine', duration = 1.5) {
                this.init();
                const osc = this.ctx.createOscillator();
                const amplifier = this.ctx.createGain();
                
                osc.type = waveform;
                
                // Advanced Frequency Step Sequencing for Complex Notification Tone
                if (waveform === 'sine') {
                    osc.frequency.setValueAtTime(880, this.ctx.currentTime);
                    osc.frequency.setValueAtTime(1200, this.ctx.currentTime + 0.2);
                } else if (waveform === 'square') {
                    osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                    osc.frequency.setValueAtTime(300, this.ctx.currentTime + 0.1);
                } else {
                    osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(100, this.ctx.currentTime + duration);
                }

                amplifier.gain.setValueAtTime(0.3, this.ctx.currentTime);
                amplifier.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                
                osc.connect(amplifier);
                amplifier.connect(this.ctx.destination);
                
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            }
        };

        // UI Element Selectors
        const display = document.getElementById('countdown-display');
        const progressRing = document.getElementById('progress-ring');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const terminalLog = document.getElementById('terminal-log');
        const timerTitleInput = document.getElementById('timer-title');
        const displayTitle = document.getElementById('display-title');

        // Theme Switchboard Engine
        function switchTheme(themeName, element) {
            document.body.setAttribute('data-theme', themeName);
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            writeLog(`Theme vector shifted to: [${themeName.toUpperCase()}]`);
        }

        // Live Diagnostic Header Clock Engine
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerHTML = `<i class="fa-solid fa-clock"></i> ${now.toTimeString().split(' ')[0]} LOC`;
        }, 1000);

        function writeLog(message) {
            const line = document.createElement('div');
            line.className = 'console-line';
            line.innerText = `[${new Date().toLocaleTimeString()}] ${message}`;
            terminalLog.appendChild(line);
            terminalLog.scrollTop = terminalLog.scrollHeight;
        }

        // Data & Core Numerical Engines
        function compileRemainingSeconds() {
            const h = parseInt(document.getElementById('hours').value) || 0;
            const m = parseInt(document.getElementById('minutes').value) || 0;
            const s = parseInt(document.getElementById('seconds').value) || 0;
            return (h * 3600) + (m * 60) + s;
        }

        function updateTelemetryDisplay() {
            const h = Math.floor(dynamicSecondsRemaining / 3600);
            const m = Math.floor((dynamicSecondsRemaining % 3600) / 60);
            const s = dynamicSecondsRemaining % 60;

            const structuredTimeStr = `${h > 0 ? String(h).padStart(2, '0') + ':' : ''}${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            display.innerText = structuredTimeStr;
            document.title = `(${structuredTimeStr}) Chronos OS`;

            // Circumference metrics engine calculations
            const circumference = 2 * Math.PI * 150; 
            const progressRatio = dynamicSecondsRemaining / totalSecondsAvailable;
            const offset = circumference * (1 - progressRatio);
            progressRing.style.strokeDashoffset = isNaN(offset) ? 0 : offset;
        }

        function loadPreset(h, m, s) {
            document.getElementById('hours').value = h;
            document.getElementById('minutes').value = m;
            document.getElementById('seconds').value = s;
            purgeSystemState();
            writeLog(`Loaded specific preset vector.`);
        }

        function triggerAlarmSequence() {
            const waveSelection = document.getElementById('alert-sound').value;
            writeLog(`ALERT MATRIX TRIGGERED: Sound architecture [${waveSelection.toUpperCase()}] executed.`);
            
            // Pulse sequence warning notification
            AudioSubsystem.trigger(waveSelection, 1.0);
            let loopCount = 0;
            const alarmInterval = setInterval(() => {
                if(loopCount < 3) {
                    AudioSubsystem.trigger(waveSelection, 1.0);
                    loopCount++;
                } else {
                    clearInterval(alarmInterval);
                }
            }, 1200);

            // Cross-device Alert Trigger notification fallback
            setTimeout(() => {
                alert(`Chronos System Notice: [${timerTitleInput.value}] window completed.`);
            }, 50);
        }

        function runTickerProcess() {
            if (dynamicSecondsRemaining <= 0) {
                clearInterval(countdownTicker);
                coreEngineRunning = false;
                triggerAlarmSequence();
                purgeSystemState();
                return;
            }
            dynamicSecondsRemaining--;
            updateTelemetryDisplay();
        }

        // Interactivity Action Listeners
        startBtn.addEventListener('click', () => {
            AudioSubsystem.init(); // Warm audio subsystems safely
            if (!coreEngineRunning) {
                if (dynamicSecondsRemaining === totalSecondsAvailable) {
                    totalSecondsAvailable = compileRemainingSeconds();
                    dynamicSecondsRemaining = totalSecondsAvailable;
                }
                
                if (dynamicSecondsRemaining <= 0) return;

                displayTitle.innerText = timerTitleInput.value;
                countdownTicker = setInterval(runTickerProcess, 1000);
                coreEngineRunning = true;
                
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                writeLog(`Engine processing started. Target count: ${totalSecondsAvailable}s`);
            }
        });

        pauseBtn.addEventListener('click', () => {
            clearInterval(countdownTicker);
            coreEngineRunning = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            writeLog(`System processing execution suspended dynamically.`);
        });

        function purgeSystemState() {
            clearInterval(countdownTicker);
            coreEngineRunning = false;
            totalSecondsAvailable = compileRemainingSeconds();
            dynamicSecondsRemaining = totalSecondsAvailable;
            updateTelemetryDisplay();
            startBtn.disabled = false;
            pauseBtn.disabled = true;
        }

        resetBtn.addEventListener('click', () => {
            purgeSystemState();
            writeLog(`System matrix cleared and reset to initial values.`);
        });

        document.getElementById('test-audio').addEventListener('click', () => {
            const selectedWave = document.getElementById('alert-sound').value;
            AudioSubsystem.trigger(selectedWave, 0.5);
            writeLog(`Audio interface diagnostic check completed: [${selectedWave}]`);
        });

        // Initialize state engine variables out of the box
        purgeSystemState();
    </script>
</body>
</html>
